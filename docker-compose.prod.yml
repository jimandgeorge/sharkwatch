services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://209.97.132.252:8000
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://209.97.132.252:8000
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "80:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:

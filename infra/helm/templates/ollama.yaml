{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ollama
  labels:
    {{- include "fraud-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fraud-copilot.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fraud-copilot.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ollama
    spec:
      {{- if .Values.ollama.gpu }}
      # Schedule on GPU nodes — label your nodes with nvidia.com/gpu
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image }}:{{ .Values.ollama.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          {{- if .Values.ollama.gpu }}
          resources:
            limits:
              nvidia.com/gpu: 1
            {{- with .Values.ollama.resources }}
            requests:
              cpu: {{ .requests.cpu }}
              memory: {{ .requests.memory }}
            {{- end }}
          {{- else }}
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-ollama-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-ollama-pvc
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.ollama.storage.storageClass }}
  storageClassName: {{ .Values.ollama.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.ollama.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ollama
  labels:
    {{- include "fraud-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  selector:
    app.kubernetes.io/name: {{ include "fraud-copilot.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ollama
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
{{- end }}
